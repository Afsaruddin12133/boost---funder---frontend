<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    {/* Animated Gradient */}
    <linearGradient id="animatedFavGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#01F27B">
        <animate attributeName="stop-color" values="#01F27B; #a3d655; #01F27B" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stopColor="#00FF85">
        <animate attributeName="stop-color" values="#00FF85; #01F27B; #00FF85" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    
    {/* Glow Filter */}
    <filter id="favGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes rotate-swoosh {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-pulse {
        transform-origin: center;
        animation: pulse 2s infinite ease-in-out;
      }
      .animate-rotate {
        transform-origin: center;
        animation: rotate-swoosh 10s infinite linear;
      }
    </style>
  </defs>

  {/* Background circle for better definition */}
  <circle cx="50" cy="50" r="48" fill="#06120b" stroke="url(#animatedFavGreen)" stroke-width="1" />

  {/* "B" Letter with pulse */}
  <g class="animate-pulse">
    <text 
      x="50%" 
      y="54%" 
      text-anchor="middle" 
      dominant-baseline="middle" 
      fill="url(#animatedFavGreen)" 
      font-family="system-ui, -apple-system, sans-serif" 
      font-weight="950" 
      font-size="65"
      filter="url(#favGlow)"
      style="letter-spacing: -0.05em;"
    >B</text>
  </g>
  
  {/* Rotating Swooshes */}
  <g class="animate-rotate">
    <path 
      d="M70 20 C85 10, 95 15, 98 25" 
      stroke="url(#animatedFavGreen)" 
      stroke-width="8" 
      stroke-linecap="round" 
      fill="none" 
    />
    <path 
      d="M2 75 C10 85, 20 90, 30 80" 
      stroke="url(#animatedFavGreen)" 
      stroke-width="8" 
      stroke-linecap="round" 
      fill="none" 
    />
  </g>
</svg>
